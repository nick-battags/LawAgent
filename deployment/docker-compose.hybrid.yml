services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: lawagent-app
    restart: unless-stopped
    env_file:
      - ./.env.vps
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: "5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../attached_assets:/app/attached_assets
      - ../training_docs_inbox:/app/training_docs_inbox
      - lawagent_instance:/app/instance
      - lawagent_chroma:/app/chroma_data
      - lawagent_outputs:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: lawagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2.8-alpine
    container_name: lawagent-caddy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      LAWAGENT_DOMAIN: ${LAWAGENT_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  lawagent_instance:
  lawagent_chroma:
  lawagent_outputs:
