<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LawAgent — Admin Login</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      .login-wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(ellipse 50% 40% at 50% 35%, rgba(59, 130, 246, 0.08), transparent),
          var(--bg);
      }
      .login-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 36px 32px;
        width: 100%;
        max-width: 360px;
        box-shadow: var(--shadow-lg);
        text-align: center;
      }
      .login-card h1 {
        font-size: 22px;
        margin-bottom: 4px;
      }
      .login-card p {
        color: var(--muted);
        margin: 0 0 24px;
        font-size: 13px;
        line-height: 1.5;
      }
      .pin-input {
        width: 100%;
        text-align: center;
        font-size: 24px;
        letter-spacing: 0.3em;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--bg);
        color: var(--ink);
        font-family: "SF Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
        transition: border-color var(--transition), box-shadow var(--transition);
      }
      .pin-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      .login-btn {
        width: 100%;
        margin-top: 14px;
        padding: 12px;
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: white;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 4px 16px var(--accent-glow);
        transition: all var(--transition);
      }
      .login-btn:hover {
        background: #2563eb;
        box-shadow: 0 6px 24px rgba(37, 99, 235, 0.3);
        transform: translateY(-1px);
      }
      .login-btn:active {
        transform: translateY(0);
      }
      .error-msg {
        color: var(--red);
        font-size: 12px;
        font-weight: 700;
        margin-top: 12px;
      }
      .back-link {
        display: inline-block;
        margin-top: 18px;
        color: var(--muted);
        font-size: 12px;
        text-decoration: none;
        transition: color var(--transition);
      }
      .back-link:hover {
        color: var(--ink);
      }
      .lock-icon {
        font-size: 32px;
        margin-bottom: 10px;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="lock-icon">&#x1f512;</div>
        <h1>Backend Access</h1>
        <p>Enter the admin PIN to continue to the management dashboard.</p>
        <form method="POST" action="/admin/login">
          <input
            class="pin-input"
            type="password"
            name="pin"
            placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;"
            maxlength="20"
            autocomplete="off"
            autofocus
            required
          />
          <button class="login-btn" type="submit">Unlock</button>
          {% if error %}
          <div class="error-msg">{{ error }}</div>
          {% endif %}
        </form>
        <a class="back-link" href="/">&larr; Back to demo</a>
      </div>
    </div>
  </body>
</html>
