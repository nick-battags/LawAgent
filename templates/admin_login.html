<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LawAgent — Admin Login</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      .login-wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 40%, rgba(59, 130, 246, 0.1), transparent 40rem),
          var(--bg);
      }
      .login-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 40px 36px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        text-align: center;
      }
      .login-card h1 {
        font-size: 26px;
        margin-bottom: 6px;
      }
      .login-card p {
        color: var(--muted);
        margin: 0 0 28px;
        font-size: 14px;
        line-height: 1.5;
      }
      .pin-input {
        width: 100%;
        text-align: center;
        font-size: 28px;
        letter-spacing: 0.3em;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .pin-input:focus {
        outline: 3px solid var(--accent-dim);
        border-color: var(--accent);
      }
      .login-btn {
        width: 100%;
        margin-top: 16px;
        padding: 14px;
        border: 0;
        border-radius: 12px;
        background: var(--accent);
        color: white;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        box-shadow: 0 8px 24px var(--accent-glow);
        transition: background 0.15s;
      }
      .login-btn:hover {
        background: #2563eb;
      }
      .error-msg {
        color: var(--red);
        font-size: 13px;
        font-weight: 700;
        margin-top: 14px;
      }
      .back-link {
        display: inline-block;
        margin-top: 20px;
        color: var(--muted);
        font-size: 13px;
        text-decoration: none;
      }
      .back-link:hover {
        color: var(--ink);
      }
      .lock-icon {
        font-size: 40px;
        margin-bottom: 12px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="lock-icon">&#x1f512;</div>
        <h1>Backend Access</h1>
        <p>Enter the admin PIN to continue to the management dashboard.</p>
        <form method="POST" action="/admin/login">
          <input
            class="pin-input"
            type="password"
            name="pin"
            placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;"
            maxlength="20"
            autocomplete="off"
            autofocus
            required
          />
          <button class="login-btn" type="submit">Unlock</button>
          {% if error %}
          <div class="error-msg">{{ error }}</div>
          {% endif %}
        </form>
        <a class="back-link" href="/">&larr; Back to demo</a>
      </div>
    </div>
  </body>
</html>
